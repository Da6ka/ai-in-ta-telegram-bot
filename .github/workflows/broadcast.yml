name: Broadcast to subscribers

# Triggered by the Worker's /broadcast command via repository_dispatch. Delivery
# runs here (not in the Worker) so the send fan-out isn't bounded by the Worker's
# per-invocation subrequest cap (BUG-4). The message and the owner's chat id come
# in via client_payload and are read as env vars — never interpolated into a
# shell command — so a message with shell metacharacters is inert.
on:
  repository_dispatch:
    types: [broadcast]

permissions:
  contents: read

# Deliberately NO concurrency group (AUD-3): GitHub keeps only the latest
# *pending* run per group, so with a shared group a third rapid /broadcast
# silently replaced the queued second one — cancelled runs don't trigger the
# failure() alert, and the owner had already been told it was on its way.
# Concurrent broadcast runs are safe to overlap: each is paced under the
# Telegram rate limit and retries 429s honoring Retry-After, so worst case two
# overlapping runs deliver slightly slower, never drop a message.

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # #28: the Worker's dispatch retry can fire this event twice for the
      # same /broadcast command if GitHub accepted the original POST but the
      # response was lost -- without this, every subscriber gets the message
      # twice. Note this workflow deliberately has no concurrency group
      # (AUD-3 above), so this check-then-set isn't fully atomic against two
      # near-simultaneous duplicate runs; it closes the realistic case (a
      # retry seconds later after backoff), not a theoretical race window of
      # a few hundred milliseconds.
      - name: Check dispatch idempotency
        id: dispatch_guard
        env:
          DISPATCH_ID: ${{ github.event.client_payload.dispatch_id }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: node scripts/check-dispatch-once.mjs

      - name: Deliver broadcast
        if: steps.dispatch_guard.outputs.duplicate != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          MESSAGE: ${{ github.event.client_payload.message }}
          OWNER_CHAT_ID: ${{ github.event.client_payload.owner }}
        run: node scripts/broadcast.mjs

      # If delivery threw before the script could report back, tell the owner so
      # a failed broadcast isn't silent.
      - name: Notify owner on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.owner }}
          ALERT_TEXT: "[ai-in-ta] Broadcast delivery FAILED — subscribers may not have received your message. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: node scripts/send-alert.mjs
