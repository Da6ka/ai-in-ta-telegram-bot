name: Daily AI-in-TA Briefing

on:
  # Primary trigger is the Cloudflare Worker's Cron Trigger (worker/wrangler.toml
  # + worker/src/index.js's `scheduled` handler), which fires a
  # 'daily-briefing-trigger' repository_dispatch at 09:05 UTC. GitHub's own
  # `schedule` trigger below is kept as a redundant backup -- it has proven to
  # fire 1-4h late or not at all for this workflow (issue #17), which is why
  # it can no longer be relied on alone. The idempotency check right below
  # makes it safe for both (plus the watchdog's fallback dispatch) to fire on
  # the same day.
  schedule:
    # 09:00 UTC == 12:00 MSK, matching the local launchd job it replaces
    - cron: "0 9 * * *"
  repository_dispatch:
    types: [daily-briefing-trigger]
  workflow_dispatch: {}

permissions:
  contents: write
  # The prompt re-benchmark mechanism logs each edition's scorecard row to a
  # tracking issue (only while the REBENCH repo variable is 'on'; see the
  # scoring step below). Reusable for any prompt change, not just Phase 16's
  # original run -- see docs/qa/rebench-template.md.
  issues: write

# Shared with on-demand-briefing.yml: both workflows write
# state/today_briefing.md and Cloudflare KV, so they must never overlap.
concurrency:
  group: briefing-generation
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned once, at job start, so every later step (idempotency check,
      # generation, the freshness check, force-briefing-date.mjs,
      # update-recent-stories.mjs, sync-kv.mjs, the commit message, the Phase
      # 16 scorer) agrees on "today" even if generation runs long enough to
      # straddle UTC midnight -- each step recomputing its own `date -u`/
      # `new Date()` independently could otherwise disagree (#25).
      - name: Pin today's date
        run: |
          echo "BRIEFING_DATE_ISO=$(date -u +%F)" >> "$GITHUB_ENV"
          echo "BRIEFING_DATE_HUMAN=$(date -u '+%-d %B %Y')" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@2.1.201

      - name: Check idempotency
        id: idempotency
        run: |
          TODAY="$BRIEFING_DATE_ISO"
          LAST=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('state/usage_stats.json','utf8')).last_briefing_at||'')}catch{console.log('')}")
          if [ "$LAST" = "$TODAY" ]; then
            echo "A briefing was already generated today ($TODAY) — skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      # Cheapest possible real request (Haiku, max_tokens: 1) to catch a
      # drained ANTHROPIC_API_KEY before the multi-dollar WebSearch generation
      # below burns its 2-attempt retry loop on a call that's already known to
      # fail. There's no balance-inspection endpoint (see script comment) --
      # this is the earliest observable signal.
      - name: Check API credit balance
        id: balance_check
        if: steps.idempotency.outputs.should_run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/check-credit-balance.mjs

      - name: Alert owner on low credit balance
        if: steps.balance_check.outputs.low_balance == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ vars.OWNER_CHAT_ID }}
          ALERT_TEXT: "[ai-in-ta] Anthropic API credit balance is too low -- today's briefing will not be generated until credits are topped up in the Anthropic Console. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: node scripts/send-alert.mjs

      # Fails the job now instead of letting "Generate briefing" run anyway --
      # a run that's already known to fail shouldn't burn its retry loop and
      # ~10-minute timeout. The generic "Alert owner on failure" step below
      # is skipped for this case (its condition excludes low_balance) so the
      # owner gets exactly one, specific alert instead of two.
      - name: Fail job on low credit balance
        if: steps.balance_check.outputs.low_balance == 'true'
        run: exit 1

      - name: Generate briefing
        if: steps.idempotency.outputs.should_run == 'true'
        timeout-minutes: 10
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          NOTE="Today's date (UTC) is ${BRIEFING_DATE_HUMAN}. Use this exact date in the title, and use it to judge which search results are genuinely from the past 24-48 hours."
          RECENT=$(node scripts/build-recency-note.mjs)
          if [ -n "$RECENT" ]; then
            NOTE="${NOTE}"$'\n\n'"${RECENT}"
          fi
          # One retry: a transient web-search/API hiccup shouldn't cost the whole
          # day's briefing. A zero-exit-but-poor generation is caught later by the
          # freshness gate + stale-generation alert, not here.
          # --max-budget-usd is a hard cost ceiling (LLM10) and the step-level
          # timeout-minutes above is a hard wall-clock ceiling (ASI02) on the
          # WebSearch-driven agent loop, which has no other iteration cap.
          # --model pins Opus explicitly. Briefly pinned to Sonnet (2026-07-11)
          # for cost, but reverted the same day: two side-by-side runs on
          # identical prompts/inputs (today's real run + a local Opus rerun)
          # showed Sonnet returning 1 story vs Opus's 6 across all three
          # sections -- a real coverage regression, not noise.
          for attempt in 1 2; do
            if claude -p "$(cat briefing-prompt.md)"$'\n\n'"$NOTE" --model claude-opus-4-8 --allowedTools "WebSearch" --max-budget-usd 4 > state/today_briefing.md 2> state/briefing_stderr.log; then
              break
            fi
            echo "Generation attempt $attempt failed. claude's stdout/stderr follow so the actual cause (rate limit, budget, auth, etc.) is visible in the log instead of silently landing in a file nobody prints on failure:"
            echo "--- stdout (state/today_briefing.md) ---"
            cat state/today_briefing.md
            echo "--- stderr ---"
            cat state/briefing_stderr.log
            # A budget-exceedance is deterministic -- a retry can't come in
            # cheaper under the same cap, it just burns another ~$4 and runs
            # the step into its 10-minute timeout. Fail fast instead. The
            # budget error lands on stdout (redirected into today_briefing.md),
            # so grep both captures.
            if grep -qi "Exceeded USD budget" state/today_briefing.md state/briefing_stderr.log; then
              echo "::error::Generation exceeded the --max-budget-usd ceiling -- not retrying (deterministic)."
              exit 1
            fi
            if [ "$attempt" -eq 2 ]; then exit 1; fi
            sleep 5
          done

      - name: Force-correct briefing date
        if: steps.idempotency.outputs.should_run == 'true'
        run: node scripts/force-briefing-date.mjs

      # Runs BEFORE the send (AUD-1): freshness alone let the dated "no content
      # available" fallback — or a degenerate 1-story generation — go out to
      # every subscriber and mark the day done. Now the day's edition must be
      # dated today AND carry at least MIN_BRIEFING_ITEMS linked stories.
      - name: Check freshness & content
        if: steps.idempotency.outputs.should_run == 'true'
        id: freshness
        run: |
          TODAY="$BRIEFING_DATE_HUMAN"
          ITEMS=$(node --input-type=module -e "import {countBriefingItems} from './shared/telegram.mjs'; import {readFileSync} from 'node:fs'; console.log(countBriefingItems(readFileSync('state/today_briefing.md','utf8')))")
          MIN=$(node --input-type=module -e "import {MIN_BRIEFING_ITEMS} from './shared/telegram.mjs'; console.log(MIN_BRIEFING_ITEMS)")
          if grep -q "$TODAY" state/today_briefing.md && [ "$ITEMS" -ge "$MIN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "Briefing rejected: dated-today grep or item minimum failed (items=$ITEMS, min=$MIN)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      # Sends to the live subscriber list the bot maintains (mirrored into the
      # `subscribers` KV key by the Worker), and outputs recipient_count for
      # the stats steps below.
      - name: Send to Telegram
        if: steps.idempotency.outputs.should_run == 'true' && steps.freshness.outputs.ok == 'true'
        id: send
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: node scripts/send-briefing.mjs

      # Gated on the content check: a garbage/thin generation must NOT set
      # last_briefing_at, or the idempotency check would mark the day as
      # done and block every retry while subscribers got nothing.
      - name: Update usage stats
        if: steps.idempotency.outputs.should_run == 'true' && steps.freshness.outputs.ok == 'true'
        env:
          RECIPIENT_COUNT: ${{ steps.send.outputs.recipient_count }}
        run: node scripts/update-usage-stats.mjs

      # Feeds tomorrow's generation via build-recency-note.mjs, so a real
      # story doesn't get re-reported under a different source domain for
      # up to two weeks straight (see shared/telegram.mjs's
      # RECENT_STORIES_WINDOW_DAYS). Gated the same as usage stats: only a
      # sent, content-passing edition should count as "covered".
      - name: Record covered stories
        if: steps.idempotency.outputs.should_run == 'true' && steps.freshness.outputs.ok == 'true' && steps.send.outcome == 'success'
        run: node scripts/update-recent-stories.mjs

      - name: Sync to Cloudflare KV
        if: steps.idempotency.outputs.should_run == 'true' && steps.freshness.outputs.ok == 'true'
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          RECIPIENT_COUNT: ${{ steps.send.outputs.recipient_count }}
        run: node scripts/sync-kv.mjs

      # Issue #24: a bare pull-rebase+push here had no retry, so a push that lost
      # a race (or hit a transient failure) failed the whole job AFTER subscribers
      # already got the briefing — silently dropping the usage-stats/recent-stories
      # update for the day with no recovery. This commit only ever touches state/,
      # so on a rebase conflict `-X theirs` is safe: it always keeps our
      # freshly-generated state over whatever the conflicting upstream commit did
      # to the same lines (note: for `rebase`, "theirs" means the commit being
      # replayed — i.e. ours — the opposite of `merge`'s meaning).
      - name: Commit updated state
        if: steps.idempotency.outputs.should_run == 'true'
        run: |
          git config user.name "daily-briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi
          git commit -m "Update briefing state for $BRIEFING_DATE_ISO"
          for attempt in 1 2 3; do
            if git pull --rebase -X theirs origin main && git push; then
              exit 0
            fi
            echo "Push attempt $attempt failed — retrying after a fresh pull."
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push updated state after 3 attempts. Today's briefing already went out to subscribers, but state/ (usage stats, recent-story dedup) was NOT updated — a manual push may be needed."
          exit 1

      # Editorial re-benchmark, generalized from its original Phase 16 run --
      # use after any prompt change worth re-validating, not just growth pushes.
      # OFF by default; flip on with `gh variable set REBENCH --body on` for the
      # ~5-day window, then unset it. Logs the scriptable scorecard row for each
      # edition to a single tracking issue. Runs whether or not the edition was
      # sent — a thin/stale day is exactly the worst-day case the floor scores —
      # and never fails the workflow (the scorer's hard-gate exit is captured,
      # not propagated). See docs/qa/rebench-template.md.
      - name: Prompt re-benchmark scoring
        if: steps.idempotency.outputs.should_run == 'true' && vars.REBENCH == 'on'
        # A benchmark-logging hiccup must never fail the job or trigger the
        # owner failure alert — this is telemetry, not delivery.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY="$BRIEFING_DATE_ISO"
          set +e
          OUT=$(node scripts/score-briefing.mjs state/today_briefing.md --no-fetch 2>&1)
          CODE=$?
          set -e
          SENT="${{ steps.freshness.outputs.ok }}"
          TITLE="Prompt re-benchmark — 5-run log"
          ISSUE=$(gh issue list --search "$TITLE in:title" --state open --json number --jq '.[0].number')
          if [ -z "$ISSUE" ]; then
            URL=$(gh issue create --title "$TITLE" \
              --body "Auto-logged scorecard rows from the next 5 daily editions while \`REBENCH=on\` (docs/qa/rebench-template.md). Logging **stops on its own after 5 rows** — the variable can be left as-is or unset. Each comment carries the scriptable columns; fill G6/G8 and the five editorial 1-10 scores by hand, then apply the verdict rule.")
            ISSUE=$(printf '%s' "$URL" | grep -oE '[0-9]+$')
          fi
          # Self-limiting: count rows already logged (each carries "daily
          # edition"); stop at 5 so the benchmark auto-terminates without anyone
          # having to flip REBENCH back off.
          ROWS=$(gh issue view "$ISSUE" --json comments --jq '[.comments[] | select(.body | contains("daily edition"))] | length')
          ROWS=${ROWS:-0}
          if [ "$ROWS" -ge 5 ]; then
            echo "Phase 16 benchmark already has $ROWS/5 rows logged — nothing to do."
            exit 0
          fi
          N=$((ROWS + 1))
          # The backticks below are a literal markdown code fence in the printf
          # format string, not an attempted command substitution; values are
          # interpolated via the %s args, so this must stay single-quoted.
          # shellcheck disable=SC2016
          BODY=$(printf '### %s — daily edition %s/5 (sent=%s, scorer exit=%s)\n\nWorkflow run: %s\n\n```\n%s\n```\n\n_G6 (source tiering) and G8 (silent fallback) are manual; add the five editorial 1-10 scores here._' \
            "$TODAY" "$N" "${SENT:-false}" "$CODE" \
            "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "$OUT")
          gh issue comment "$ISSUE" --body "$BODY"
          if [ "$N" -ge 5 ]; then
            gh issue comment "$ISSUE" --body "✅ 5/5 editions logged — benchmark window complete. Fill any remaining manual scores (G6/G8 + editorial 1-10), apply the verdict rule, then optionally unset the flag: \`gh variable set REBENCH --body off\`."
          fi

      # Generation ran but produced nothing usable (not dated today, or below
      # the story minimum): the gate correctly skipped the send + stats, but
      # subscribers got nothing and nobody would know without this. The day is
      # NOT marked done, so a manual re-run can still deliver.
      - name: Alert owner on stale or thin generation
        if: steps.idempotency.outputs.should_run == 'true' && steps.freshness.outputs.ok == 'false'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ vars.OWNER_CHAT_ID }}
          ALERT_TEXT: "[ai-in-ta] Daily briefing was stale or below the story minimum — nothing sent to subscribers, stats not advanced. Re-run the workflow to retry. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: node scripts/send-alert.mjs

      # Any step above threw (generation, send, KV sync, commit/push): the day's
      # briefing did not go out cleanly. Fires last so it catches every prior step.
      # Excludes the low-balance case -- that already got a more specific alert
      # above, and we don't want the owner getting two messages for one cause.
      - name: Alert owner on failure
        if: failure() && steps.balance_check.outputs.low_balance != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ vars.OWNER_CHAT_ID }}
          ALERT_TEXT: "[ai-in-ta] Daily briefing workflow FAILED — subscribers may have gotten nothing. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: node scripts/send-alert.mjs
