name: Daily AI-in-TA Briefing

on:
  schedule:
    # 09:00 UTC == 12:00 MSK, matching the local launchd job it replaces
    - cron: '0 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

# Shared with on-demand-briefing.yml: both workflows write
# state/today_briefing.md and Cloudflare KV, so they must never overlap.
concurrency:
  group: briefing-generation
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Check idempotency
        id: idempotency
        run: |
          TODAY=$(date -u +%F)
          LAST=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('state/usage_stats.json','utf8')).last_briefing_at||'')}catch{console.log('')}")
          if [ "$LAST" = "$TODAY" ]; then
            echo "A briefing was already generated today ($TODAY) — skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate briefing
        if: steps.idempotency.outputs.should_run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY_HUMAN=$(date -u '+%-d %B %Y')
          NOTE="Today's date (UTC) is ${TODAY_HUMAN}. Use this exact date in the title, and use it to judge which search results are genuinely from the past 24-48 hours."
          claude -p "$(cat briefing-prompt.md)"$'\n\n'"$NOTE" --allowedTools "WebSearch" > state/today_briefing.md

      - name: Force-correct briefing date
        if: steps.idempotency.outputs.should_run == 'true'
        run: node scripts/force-briefing-date.mjs

      # Sends to the live subscriber list the bot maintains (mirrored into the
      # `subscribers` KV key by the Worker), and outputs recipient_count for
      # the stats steps below.
      - name: Send to Telegram
        if: steps.idempotency.outputs.should_run == 'true'
        id: send
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: node scripts/send-briefing.mjs

      - name: Check freshness
        if: steps.idempotency.outputs.should_run == 'true'
        id: freshness
        run: |
          TODAY=$(date -u '+%-d %B %Y')
          if grep -q "$TODAY" state/today_briefing.md; then
            echo "fresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "fresh=false" >> "$GITHUB_OUTPUT"
          fi

      # Gated on freshness: a garbage generation (no header/date) must NOT
      # set last_briefing_at, or the idempotency check would mark the day as
      # done and block every retry while subscribers got nothing.
      - name: Update usage stats
        if: steps.idempotency.outputs.should_run == 'true' && steps.freshness.outputs.fresh == 'true'
        env:
          RECIPIENT_COUNT: ${{ steps.send.outputs.recipient_count }}
        run: node scripts/update-usage-stats.mjs

      - name: Sync to Cloudflare KV
        if: steps.idempotency.outputs.should_run == 'true' && steps.freshness.outputs.fresh == 'true'
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          RECIPIENT_COUNT: ${{ steps.send.outputs.recipient_count }}
        run: node scripts/sync-kv.mjs

      - name: Commit updated state
        if: steps.idempotency.outputs.should_run == 'true'
        run: |
          git config user.name "daily-briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/
          git diff --cached --quiet && echo "No state changes to commit" || git commit -m "Update briefing state for $(date -u +%F)"
          git pull --rebase origin main
          git push
