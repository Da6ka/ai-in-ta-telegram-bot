name: Daily AI-in-TA Briefing

on:
  schedule:
    # 09:00 UTC == 12:00 MSK, matching the local launchd job it replaces
    - cron: '0 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

# Shared with on-demand-briefing.yml: both workflows write
# state/today_briefing.md and Cloudflare KV, so they must never overlap.
concurrency:
  group: briefing-generation
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Check idempotency
        id: idempotency
        run: |
          TODAY=$(date -u +%F)
          LAST=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('state/usage_stats.json','utf8')).last_briefing_at||'')}catch{console.log('')}")
          if [ "$LAST" = "$TODAY" ]; then
            echo "A briefing was already generated today ($TODAY) — skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate briefing
        if: steps.idempotency.outputs.should_run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY_HUMAN=$(date -u '+%-d %B %Y')
          NOTE="Today's date (UTC) is ${TODAY_HUMAN}. Use this exact date in the title, and use it to judge which search results are genuinely from the past 24-48 hours."
          # One retry: a transient web-search/API hiccup shouldn't cost the whole
          # day's briefing. A zero-exit-but-poor generation is caught later by the
          # freshness gate + stale-generation alert, not here.
          for attempt in 1 2; do
            if claude -p "$(cat briefing-prompt.md)"$'\n\n'"$NOTE" --allowedTools "WebSearch" > state/today_briefing.md; then
              break
            fi
            echo "Generation attempt $attempt failed."
            if [ "$attempt" -eq 2 ]; then exit 1; fi
            sleep 5
          done

      - name: Force-correct briefing date
        if: steps.idempotency.outputs.should_run == 'true'
        run: node scripts/force-briefing-date.mjs

      # Runs BEFORE the send (AUD-1): freshness alone let the dated "no content
      # available" fallback — or a degenerate 1-story generation — go out to
      # every subscriber and mark the day done. Now the day's edition must be
      # dated today AND carry at least MIN_BRIEFING_ITEMS linked stories.
      - name: Check freshness & content
        if: steps.idempotency.outputs.should_run == 'true'
        id: freshness
        run: |
          TODAY=$(date -u '+%-d %B %Y')
          ITEMS=$(node --input-type=module -e "import {countBriefingItems} from './shared/telegram.mjs'; import {readFileSync} from 'node:fs'; console.log(countBriefingItems(readFileSync('state/today_briefing.md','utf8')))")
          MIN=$(node --input-type=module -e "import {MIN_BRIEFING_ITEMS} from './shared/telegram.mjs'; console.log(MIN_BRIEFING_ITEMS)")
          if grep -q "$TODAY" state/today_briefing.md && [ "$ITEMS" -ge "$MIN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "Briefing rejected: dated-today grep or item minimum failed (items=$ITEMS, min=$MIN)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      # Sends to the live subscriber list the bot maintains (mirrored into the
      # `subscribers` KV key by the Worker), and outputs recipient_count for
      # the stats steps below.
      - name: Send to Telegram
        if: steps.idempotency.outputs.should_run == 'true' && steps.freshness.outputs.ok == 'true'
        id: send
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: node scripts/send-briefing.mjs

      # Gated on the content check: a garbage/thin generation must NOT set
      # last_briefing_at, or the idempotency check would mark the day as
      # done and block every retry while subscribers got nothing.
      - name: Update usage stats
        if: steps.idempotency.outputs.should_run == 'true' && steps.freshness.outputs.ok == 'true'
        env:
          RECIPIENT_COUNT: ${{ steps.send.outputs.recipient_count }}
        run: node scripts/update-usage-stats.mjs

      - name: Sync to Cloudflare KV
        if: steps.idempotency.outputs.should_run == 'true' && steps.freshness.outputs.ok == 'true'
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          RECIPIENT_COUNT: ${{ steps.send.outputs.recipient_count }}
        run: node scripts/sync-kv.mjs

      - name: Commit updated state
        if: steps.idempotency.outputs.should_run == 'true'
        run: |
          git config user.name "daily-briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/
          git diff --cached --quiet && echo "No state changes to commit" || git commit -m "Update briefing state for $(date -u +%F)"
          git pull --rebase origin main
          git push

      # Generation ran but produced nothing usable (not dated today, or below
      # the story minimum): the gate correctly skipped the send + stats, but
      # subscribers got nothing and nobody would know without this. The day is
      # NOT marked done, so a manual re-run can still deliver.
      - name: Alert owner on stale or thin generation
        if: steps.idempotency.outputs.should_run == 'true' && steps.freshness.outputs.ok == 'false'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ vars.OWNER_CHAT_ID }}
          ALERT_TEXT: "[ai-in-ta] Daily briefing was stale or below the story minimum — nothing sent to subscribers, stats not advanced. Re-run the workflow to retry. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: node scripts/send-alert.mjs

      # Any step above threw (generation, send, KV sync, commit/push): the day's
      # briefing did not go out cleanly. Fires last so it catches every prior step.
      - name: Alert owner on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ vars.OWNER_CHAT_ID }}
          ALERT_TEXT: "[ai-in-ta] Daily briefing workflow FAILED — subscribers may have gotten nothing. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: node scripts/send-alert.mjs
