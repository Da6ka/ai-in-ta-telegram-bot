name: On-Demand Briefing

on:
  repository_dispatch:
    types: [newbriefing]

permissions:
  contents: write

# Shared with daily-briefing.yml: both workflows write
# state/today_briefing.md and Cloudflare KV, so they must never overlap.
concurrency:
  group: briefing-generation
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@2.1.201

      - name: Generate briefing
        timeout-minutes: 10
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY_HUMAN=$(date -u '+%-d %B %Y')
          NOTE="Today's date (UTC) is ${TODAY_HUMAN}. Use this exact date in the title, and use it to judge which search results are genuinely from the past 24-48 hours."
          # One retry so a transient hiccup doesn't fail a user's on-demand request.
          # --max-budget-usd is a hard cost ceiling (LLM10) and the step-level
          # timeout-minutes above is a hard wall-clock ceiling (ASI02) on the
          # WebSearch-driven agent loop, which has no other iteration cap.
          for attempt in 1 2; do
            if claude -p "$(cat briefing-prompt-ondemand.md)"$'\n\n'"$NOTE" --allowedTools "WebSearch" --max-budget-usd 2 > state/today_briefing.md 2> state/briefing_stderr.log; then
              break
            fi
            echo "Generation attempt $attempt failed. claude's stdout/stderr follow so the actual cause (rate limit, budget, auth, etc.) is visible in the log instead of silently landing in a file nobody prints on failure:"
            echo "--- stdout (state/today_briefing.md) ---"
            cat state/today_briefing.md
            echo "--- stderr ---"
            cat state/briefing_stderr.log
            if [ "$attempt" -eq 2 ]; then exit 1; fi
            sleep 5
          done

      - name: Force-correct briefing date
        run: node scripts/force-briefing-date.mjs

      # Same gate as daily-briefing.yml (the BUG-1 fix): a zero-exit garbage
      # generation (LLM refusal / no dated header) must NOT reach the requester
      # or, worse, overwrite the shared today_briefing_md in KV that every
      # user's /briefing serves. Without this the on-demand path could poison
      # the cache for everyone (NEW-1).
      - name: Check freshness
        id: freshness
        run: |
          TODAY=$(date -u '+%-d %B %Y')
          # AUD-1: also count linked story bullets. The requester still gets a
          # real-but-thin (1-story) briefing — they asked for it — but a
          # zero-story generation (the "no content" fallback) is treated like a
          # stale one, and sync-kv.mjs refuses to cache anything below the
          # MIN_BRIEFING_ITEMS floor so a thin run can't replace the shared
          # briefing everyone else's /briefing serves.
          ITEMS=$(node --input-type=module -e "import {countBriefingItems} from './shared/telegram.mjs'; import {readFileSync} from 'node:fs'; console.log(countBriefingItems(readFileSync('state/today_briefing.md','utf8')))")
          echo "items=$ITEMS" >> "$GITHUB_OUTPUT"
          if grep -q "$TODAY" state/today_briefing.md; then
            echo "fresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "fresh=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send to requester
        if: steps.freshness.outputs.fresh == 'true' && steps.freshness.outputs.items != '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
        run: node scripts/send-to-chat.mjs

      - name: Sync to Cloudflare KV
        if: steps.freshness.outputs.fresh == 'true'
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          RECIPIENT_COUNT: 1
        run: node scripts/sync-kv.mjs

      - name: Commit updated state
        if: steps.freshness.outputs.fresh == 'true'
        run: |
          git config user.name "daily-briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/
          git diff --cached --quiet && echo "No state changes to commit" || git commit -m "Update briefing state (on-demand, $(date -u +%F))"
          git pull --rebase origin main
          git push

      # Generation exited 0 but produced nothing usable — not dated today
      # (refusal / malformed title) or zero linked stories (the "no content"
      # fallback): the gates correctly skipped the send, but the requester is
      # still waiting. failure() won't fire here (no step threw), so close the
      # loop explicitly.
      - name: Notify requester on stale generation
        if: steps.freshness.outputs.fresh == 'false' || steps.freshness.outputs.items == '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          ALERT_TEXT: "Sorry — the fresh briefing didn't come out right this time. Please try /newbriefing again shortly, or /briefing for the last saved one."
        run: node scripts/send-alert.mjs

      # The requester already saw "Generating a fresh briefing..." from the
      # Worker; on failure, close the loop instead of leaving them in silence.
      - name: Notify requester on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          ALERT_TEXT: "Sorry — generating your briefing failed. Please try /newbriefing again shortly, or /briefing for the last saved one. Contact the bot owner if this keeps happening."
        run: node scripts/send-alert.mjs
