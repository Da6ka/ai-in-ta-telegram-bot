name: On-Demand Briefing

on:
  repository_dispatch:
    types: [newbriefing]

permissions:
  contents: write

# Shared with daily-briefing.yml: both workflows write
# state/today_briefing.md and Cloudflare KV, so they must never overlap.
concurrency:
  group: briefing-generation
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned once, at job start, so every later step (generation, the
      # freshness check, force-briefing-date.mjs, update-recent-stories.mjs,
      # sync-kv.mjs, the commit message) agrees on "today" even if generation
      # runs long enough to straddle UTC midnight -- each step recomputing its
      # own `date -u`/`new Date()` independently could otherwise disagree (#25).
      - name: Pin today's date
        run: |
          echo "BRIEFING_DATE_ISO=$(date -u +%F)" >> "$GITHUB_ENV"
          echo "BRIEFING_DATE_HUMAN=$(date -u '+%-d %B %Y')" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # #28: the Worker's dispatch retry can fire this event twice for the
      # same underlying /newbriefing request if GitHub accepted the original
      # POST but the response was lost. Skips the expensive regeneration for
      # a detected duplicate -- "Check freshness" below still correctly
      # sends/rejects based on whatever's actually in state/today_briefing.md.
      - name: Check dispatch idempotency
        id: dispatch_guard
        env:
          DISPATCH_ID: ${{ github.event.client_payload.dispatch_id }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: node scripts/check-dispatch-once.mjs

      - name: Install Claude Code
        if: steps.dispatch_guard.outputs.duplicate != 'true'
        run: npm install -g @anthropic-ai/claude-code@2.1.201

      # Same precheck as daily-briefing.yml: catch a drained ANTHROPIC_API_KEY
      # with the cheapest possible real request before burning the requester's
      # wait time on a generation that's already known to fail.
      - name: Check API credit balance
        id: balance_check
        if: steps.dispatch_guard.outputs.duplicate != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/check-credit-balance.mjs

      - name: Alert owner on low credit balance
        if: steps.balance_check.outputs.low_balance == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ vars.OWNER_CHAT_ID }}
          ALERT_TEXT: "[ai-in-ta] Anthropic API credit balance is too low -- an on-demand briefing request just failed because of it. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: node scripts/send-alert.mjs

      - name: Notify requester on low credit balance
        if: steps.balance_check.outputs.low_balance == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          ALERT_TEXT: "Sorry -- the bot is temporarily out of API credits. The owner has been notified. Please try /newbriefing again later, or /briefing for the last saved one."
        run: node scripts/send-alert.mjs

      # Fails the job now instead of letting "Generate briefing" run anyway --
      # see daily-briefing.yml's identical step for why. "Notify requester on
      # failure" below is skipped for this case (its condition excludes
      # low_balance) so the requester doesn't get a duplicate message.
      - name: Fail job on low credit balance
        if: steps.balance_check.outputs.low_balance == 'true'
        run: exit 1

      - name: Generate briefing
        if: steps.dispatch_guard.outputs.duplicate != 'true'
        timeout-minutes: 10
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          NOTE="Today's date (UTC) is ${BRIEFING_DATE_HUMAN}. Use this exact date in the title, and use it to judge which search results are genuinely from the past 24-48 hours."
          RECENT=$(node scripts/build-recency-note.mjs)
          if [ -n "$RECENT" ]; then
            NOTE="${NOTE}"$'\n\n'"${RECENT}"
          fi
          # One retry so a transient hiccup doesn't fail a user's on-demand request.
          # --max-budget-usd is a hard cost ceiling (LLM10) and the step-level
          # timeout-minutes above is a hard wall-clock ceiling (ASI02) on the
          # WebSearch-driven agent loop, which has no other iteration cap.
          for attempt in 1 2; do
            if claude -p "$(cat briefing-prompt-ondemand.md)"$'\n\n'"$NOTE" --allowedTools "WebSearch" --max-budget-usd 2 > state/today_briefing.md 2> state/briefing_stderr.log; then
              break
            fi
            echo "Generation attempt $attempt failed. claude's stdout/stderr follow so the actual cause (rate limit, budget, auth, etc.) is visible in the log instead of silently landing in a file nobody prints on failure:"
            echo "--- stdout (state/today_briefing.md) ---"
            cat state/today_briefing.md
            echo "--- stderr ---"
            cat state/briefing_stderr.log
            if [ "$attempt" -eq 2 ]; then exit 1; fi
            sleep 5
          done

      - name: Force-correct briefing date
        if: steps.dispatch_guard.outputs.duplicate != 'true'
        run: node scripts/force-briefing-date.mjs

      # Same gate as daily-briefing.yml (the BUG-1 fix): a zero-exit garbage
      # generation (LLM refusal / no dated header) must NOT reach the requester
      # or, worse, overwrite the shared today_briefing_md in KV that every
      # user's /briefing serves. Without this the on-demand path could poison
      # the cache for everyone (NEW-1).
      - name: Check freshness
        id: freshness
        run: |
          TODAY="$BRIEFING_DATE_HUMAN"
          # AUD-1: also count linked story bullets. The requester still gets a
          # real-but-thin (1-story) briefing — they asked for it — but a
          # zero-story generation (the "no content" fallback) is treated like a
          # stale one, and sync-kv.mjs refuses to cache anything below the
          # MIN_BRIEFING_ITEMS floor so a thin run can't replace the shared
          # briefing everyone else's /briefing serves.
          ITEMS=$(node --input-type=module -e "import {countBriefingItems} from './shared/telegram.mjs'; import {readFileSync} from 'node:fs'; console.log(countBriefingItems(readFileSync('state/today_briefing.md','utf8')))")
          echo "items=$ITEMS" >> "$GITHUB_OUTPUT"
          if grep -q "$TODAY" state/today_briefing.md; then
            echo "fresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "fresh=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send to requester
        if: steps.freshness.outputs.fresh == 'true' && steps.freshness.outputs.items != '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
        run: node scripts/send-to-chat.mjs

      # Feeds the next generation (daily or on-demand) via build-recency-note.mjs.
      # Gated the same as the send: only a real, content-passing edition should
      # count as "covered" (see daily-briefing.yml's equivalent step).
      - name: Record covered stories
        if: steps.freshness.outputs.fresh == 'true' && steps.freshness.outputs.items != '0'
        run: node scripts/update-recent-stories.mjs

      - name: Sync to Cloudflare KV
        if: steps.freshness.outputs.fresh == 'true'
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          RECIPIENT_COUNT: 1
        run: node scripts/sync-kv.mjs

      # Issue #24: a bare pull-rebase+push here had no retry, so a push that lost
      # a race (or hit a transient failure) failed the whole job AFTER the
      # requester already got their briefing — silently dropping the
      # recent-stories update for this edition with no recovery. This commit
      # only ever touches state/, so on a rebase conflict `-X theirs` is safe:
      # it always keeps our freshly-generated state over whatever the conflicting
      # upstream commit did to the same lines (note: for `rebase`, "theirs" means
      # the commit being replayed — i.e. ours — the opposite of `merge`'s meaning).
      - name: Commit updated state
        if: steps.freshness.outputs.fresh == 'true'
        run: |
          git config user.name "daily-briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi
          git commit -m "Update briefing state (on-demand, $BRIEFING_DATE_ISO)"
          for attempt in 1 2 3; do
            if git pull --rebase -X theirs origin main && git push; then
              exit 0
            fi
            echo "Push attempt $attempt failed — retrying after a fresh pull."
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push updated state after 3 attempts. The briefing already went out to the requester, but state/ (recent-story dedup) was NOT updated — a manual push may be needed."
          exit 1

      # Generation exited 0 but produced nothing usable — not dated today
      # (refusal / malformed title) or zero linked stories (the "no content"
      # fallback): the gates correctly skipped the send, but the requester is
      # still waiting. failure() won't fire here (no step threw), so close the
      # loop explicitly.
      - name: Notify requester on stale generation
        if: steps.freshness.outputs.fresh == 'false' || steps.freshness.outputs.items == '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          ALERT_TEXT: "Sorry — the fresh briefing didn't come out right this time. Please try /newbriefing again shortly, or /briefing for the last saved one."
        run: node scripts/send-alert.mjs

      # The requester already saw "Generating a fresh briefing..." from the
      # Worker; on failure, close the loop instead of leaving them in silence.
      # Excludes the low-balance case -- that already got a specific alert
      # above, so the requester doesn't get a duplicate message.
      - name: Notify requester on failure
        if: failure() && steps.balance_check.outputs.low_balance != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          ALERT_TEXT: "Sorry — generating your briefing failed. Please try /newbriefing again shortly, or /briefing for the last saved one. Contact the bot owner if this keeps happening."
        run: node scripts/send-alert.mjs
