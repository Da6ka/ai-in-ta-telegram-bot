name: On-Demand Briefing

on:
  repository_dispatch:
    types: [newbriefing]

permissions:
  contents: write

# Shared with daily-briefing.yml: both workflows write
# state/today_briefing.md and Cloudflare KV, so they must never overlap.
concurrency:
  group: briefing-generation
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY_HUMAN=$(date -u '+%-d %B %Y')
          NOTE="Today's date (UTC) is ${TODAY_HUMAN}. Use this exact date in the title, and use it to judge which search results are genuinely from the past 24-48 hours."
          # One retry so a transient hiccup doesn't fail a user's on-demand request.
          for attempt in 1 2; do
            if claude -p "$(cat briefing-prompt-ondemand.md)"$'\n\n'"$NOTE" --allowedTools "WebSearch" > state/today_briefing.md; then
              break
            fi
            echo "Generation attempt $attempt failed."
            if [ "$attempt" -eq 2 ]; then exit 1; fi
            sleep 5
          done

      - name: Force-correct briefing date
        run: node scripts/force-briefing-date.mjs

      - name: Send to requester
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
        run: node scripts/send-to-chat.mjs

      - name: Sync to Cloudflare KV
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          RECIPIENT_COUNT: 1
        run: node scripts/sync-kv.mjs

      - name: Commit updated state
        run: |
          git config user.name "daily-briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/
          git diff --cached --quiet && echo "No state changes to commit" || git commit -m "Update briefing state (on-demand, $(date -u +%F))"
          git pull --rebase origin main
          git push

      # The requester already saw "Generating a fresh briefing..." from the
      # Worker; on failure, close the loop instead of leaving them in silence.
      - name: Notify requester on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          ALERT_TEXT: "Sorry — generating your briefing failed. Please try /newbriefing again shortly, or /briefing for the last saved one. Contact the bot owner if this keeps happening."
        run: node scripts/send-alert.mjs
